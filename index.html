<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #6ee7b7;
      --accent-dim: rgba(110, 231, 183, 0.12);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 3.5rem;
      max-width: 500px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(110, 231, 183, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      color: #0f0f0f;
      margin-bottom: 1.5rem;
      letter-spacing: -0.5px;
    }

    .name {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 0.35rem;
    }

    .role {
      font-size: 0.9rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 1.25rem;
      letter-spacing: 0.02em;
    }

    .bio {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 1.75rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      border: 1px solid transparent;
    }

    .link:hover {
      background: var(--accent-dim);
      border-color: rgba(110, 231, 183, 0.2);
      color: var(--accent);
    }

    .link:hover .icon {
      color: var(--accent);
    }

    .icon {
      width: 20px;
      height: 20px;
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .link-label {
      flex: 1;
    }

    .link-arrow {
      color: var(--muted);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }

    .link:hover .link-arrow {
      opacity: 1;
      transform: translateX(2px);
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.75rem;
      }
      .name {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">YN</div>

    <h1 class="name">Your Name</h1>
    <p class="role">Your Role · Your Location</p>

    <p class="bio">
      A short bio about yourself. What you do, what you care about,
      and what makes you you. Keep it to a couple of sentences.
    </p>

    <div class="divider"></div>

    <div class="links">
      <a class="link" href="https://linkedin.com/in/yourhandle" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        <span class="link-label">LinkedIn</span>
        <span class="link-arrow">→</span>
      </a>

      <a class="link" href="mailto:you@example.com">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <span class="link-label">you@example.com</span>
        <span class="link-arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
